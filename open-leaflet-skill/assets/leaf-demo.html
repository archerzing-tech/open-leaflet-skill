<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaflet 地图演示 - 四川省高亮</title>
<link rel="stylesheet" href="./lib/leaflet.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  #map { width: 100%; height: 100%; min-height: 300px; }
  .leaflet-marker-icon:focus, .leaflet-marker-icon:focus-visible { outline: none !important; box-shadow: none !important; }
  /* 瓦片渲染优化：平滑缩放 */
  .leaflet-tile { image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; }
  .leaflet-tile-loaded { image-rendering: auto; }
  .info {
    padding: 8px 12px;
    font: 14px/18px sans-serif;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
    border-radius: 6px;
    border-left: 4px solid #ff4444;
  }
  .info h4 { margin: 0 0 4px; color: #333; }
  .info p { margin: 0; color: #666; font-size: 12px; }
  .legend {
    padding: 8px 12px;
    font: 13px/18px sans-serif;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
    border-radius: 6px;
  }
  .legend i {
    width: 16px; height: 16px;
    float: left; margin-right: 6px;
    opacity: 0.8;
  }
</style>
</head>
<body>
<div id="map"></div>
<script src="./lib/leaflet.js"></script>
<script src="./data/geo-data.js"></script>
<script>
// ===== 1. 初始化地图（动画与缓存优化） =====
var map = L.map('map', {
  center: [30.5, 102.0],
  zoom: 6,
  zoomControl: false,
  attributionControl: false,
  fadeAnimation: true,
  zoomAnimation: true,
  markerZoomAnimation: true,
  zoomAnimationThreshold: 4
});

// ===== 2. 缓存底图瓦片 =====
var tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  keepBuffer: 8,
  updateWhenZooming: false,
  updateInterval: 100
}).addTo(map);

// 预加载当前视图周边瓦片（平滑拖动）
tileLayer.on('load', function() {
  document.querySelectorAll('.leaflet-tile-loaded').forEach(function(t) {
    t.style.imageRendering = 'auto';
  });
});

// ===== 3. 多通道数据加载（本地 → DataV → GeoJSON.cn → GitHub CDN 镜像） =====
function loadGeoJSON(urls, callback) {
  var index = 0;
  function tryNext() {
    if (index >= urls.length) {
      console.error('所有数据源均加载失败');
      return;
    }
    fetch(urls[index])
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function(data) { callback(data); })
      .catch(function(err) {
        console.warn('↳ 失败，尝试下一个: ' + urls[index] + ' (' + err.message + ')');
        index++;
        tryNext();
      });
  }
  tryNext();
}

// 本地数据优先，失败时自动 fallback 到在线 API 和 CDN 镜像
var chinaData = GEO_DATA && GEO_DATA.china_provinces;
if (chinaData) {
  initMap(chinaData);
} else {
  console.warn('本地 geo-data.js 未加载，尝试在线数据源...');
  loadGeoJSON([
    'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json',
    'https://geojson.cn/api/china/100000.json',
    'https://cdn.jsdelivr.net/gh/xyanmi/MapData@main/provinces.cn.geojson'
  ], function(data) {
    initMap(data);
  });
}

// ===== 4. 信息控件 =====
var info = L.control({ position: 'topright' });
info.onAdd = function() {
  this._div = L.DomUtil.create('div', 'info');
  this._div.innerHTML = '<h4>四川省</h4><p>面积: 48.6万 km² | 人口: 8367万</p><p>省会: 成都 | 简称: 川/蜀</p>';
  return this._div;
};
info.addTo(map);

// ===== 5. 加载中国省级数据并高亮四川省 =====
function initMap(chinaData) {
    // 筛选出四川省
    var sichuanData = chinaData.features.filter(function(f) {
      return f.properties.name === '四川省';
    });

    // 四川省高亮图层
    var sichuanLayer = L.geoJSON(sichuanData, {
      style: {
        color: '#ff4444',
        weight: 3,
        opacity: 1,
        fillColor: '#ff4444',
        fillOpacity: 0.15
      },
      onEachFeature: function(feature, layer) {
        layer.bindPopup(
          '<b>' + feature.properties.name + '</b><br>' +
          'adcode: ' + feature.properties.adcode + '<br>' +
          '中心: ' + feature.properties.center.join(', ')
        );
        layer.on({
          mouseover: function(e) {
            e.target.setStyle({
              weight: 5,
              fillOpacity: 0.3
            });
            e.target.bringToFront();
          },
          mouseout: function(e) {
            sichuanLayer.resetStyle(e.target);
          }
        });
      }
    }).addTo(map);

    // 缩放到四川省范围
    map.fitBounds(sichuanLayer.getBounds().pad(0.05));

    // 添加其他省份灰色轮廓作为底衬（仅显示轮廓）
    var otherProvinces = chinaData.features.filter(function(f) {
      return f.properties.name !== '四川省';
    });
    L.geoJSON(otherProvinces, {
      style: {
        color: '#ccc',
        weight: 1,
        opacity: 0.6,
        fill: false
      },
      onEachFeature: function(feature, layer) {
        layer.on({
          click: function(e) {
            map.fitBounds(e.target.getBounds().pad(0.1));
          }
        });
      }
    }).addTo(map);
}

// ===== 6. 图例 =====
var legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  var div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<i style="background:#ff4444"></i> 四川省<br>' +
                  '<i style="background:#ccc;opacity:0.6"></i> 其他省份';
  return div;
};
legend.addTo(map);

// ===== 7. 点击地图获取坐标 =====
var clickPopup = L.popup();
map.on('click', function(e) {
  clickPopup
    .setLatLng(e.latlng)
    .setContent('纬度: ' + e.latlng.lat.toFixed(4) + '<br>经度: ' + e.latlng.lng.toFixed(4))
    .openOn(map);
});

// ===== 8. 自适应容器 =====
var ro = new ResizeObserver(function() { map.invalidateSize(); });
ro.observe(document.getElementById('map'));
window.addEventListener('resize', function() { map.invalidateSize(); });

// iframe 场景：父窗口尺寸变化时通知
if (window !== window.top) {
  window.addEventListener('message', function(e) {
    if (e.data === 'resize') map.invalidateSize();
  });
}

console.log('Leaflet 地图已加载。四川省以红色高亮显示。');
</script>
</body>
</html>
