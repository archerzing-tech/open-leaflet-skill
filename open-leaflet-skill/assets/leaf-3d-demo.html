<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Buildings Demo</title>
<link rel="stylesheet" href="./lib/leaflet.css" />
<script src="./lib/leaflet.js"></script>
<script src="https://cdn.osmbuildings.org/classic/0.2.2b/OSMBuildings-Leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#map{height:100%;min-height:300px;width:100%;background:#f0f0f0}

.ctrl-panel{position:absolute;top:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:8px;max-width:260px}
.ctrl-btn{padding:8px 14px;border:0;border-radius:8px;background:#fff;color:#333;font-size:14px;font-weight:500;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:all .15s;text-align:left;user-select:none}
.ctrl-btn:hover{background:#f5f5f5;transform:translateY(-1px)}
.ctrl-btn.active{background:#2563eb;color:#fff}
.ctrl-btn.active:hover{background:#1d4ed8}
.location-group{display:flex;flex-wrap:wrap;gap:6px}
.location-group .ctrl-btn{flex:1;min-width:70px;text-align:center;font-size:12px;padding:6px 10px}

.info-popup{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);color:#fff;padding:14px 22px;border-radius:12px;font-size:14px;text-align:center;max-width:400px;pointer-events:none;opacity:0;transition:opacity .3s}
.info-popup.show{opacity:1}

.legend{position:absolute;bottom:80px;right:16px;z-index:1000;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-radius:8px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.1);font-size:11px;color:#555;display:flex;flex-direction:column;gap:4px}
.legend-bar{width:120px;height:8px;border-radius:4px;background:linear-gradient(to right,#0d9488,#eab308);margin:2px 0}
.legend-labels{display:flex;justify-content:space-between;font-size:10px;color:#888}

.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;background:rgba(255,255,255,.95);border-radius:16px;padding:24px 36px;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center;font-size:15px;color:#555;transition:opacity .4s;display:flex;flex-direction:column;align-items:center;gap:12px}
.loading.hidden{opacity:0;pointer-events:none}
.spinner{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.attribution{position:absolute;bottom:4px;right:4px;z-index:999;font-size:10px;color:#999;background:rgba(255,255,255,.7);padding:2px 6px;border-radius:4px;pointer-events:none}
.attribution a{color:#666;text-decoration:none}
</style>
</head>
<body>

<div id="map"></div>

<div class="ctrl-panel">
  <button class="ctrl-btn" id="btnShadows">☀️ Toggle Shadows</button>
  <div class="location-group">
    <button class="ctrl-btn active" data-loc="shanghai">上海</button>
    <button class="ctrl-btn" data-loc="beijing">北京</button>
    <button class="ctrl-btn" data-loc="chengdu">成都</button>
    <button class="ctrl-btn" data-loc="shenzhen">深圳</button>
  </div>
</div>

<div class="info-popup" id="infoPopup"></div>

<div class="legend">
  <span>Building Height</span>
  <div class="legend-bar"></div>
  <div class="legend-labels">
    <span>0m</span>
    <span>100m</span>
    <span>200m+</span>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <span>Loading 3D Buildings...</span>
</div>

<div class="attribution">© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> · <a href="https://osmbuildings.org">OSM Buildings</a></div>

<script>
var locations = {
  shanghai:  { lat: 31.241, lng: 121.500, zoom: 16, name: 'Shanghai Lujiazui' },
  beijing:   { lat: 39.908, lng: 116.397, zoom: 16, name: 'Beijing Tiananmen' },
  chengdu:   { lat: 30.660, lng: 104.063, zoom: 16, name: 'Chengdu CBD' },
  shenzhen:  { lat: 22.543, lng: 114.058, zoom: 16, name: 'Shenzhen Futian' }
};

var map = L.map('map', {
  attributionControl: false,
  zoomControl: false,
  preferCanvas: true,
  fadeAnimation: true,
  zoomAnimation: true
});

var tile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  keepBuffer: 8,
  updateWhenIdle: false
}).addTo(map);

var osmb, activeLocation = 'shanghai';
var popup = document.getElementById('infoPopup');
var loading = document.getElementById('loading');
var btnShadows = document.getElementById('btnShadows');
var locBtns = document.querySelectorAll('[data-loc]');

function heightColor(h) {
  var t = Math.min(h / 150, 1);
  var r = Math.round(13 + 227 * t);
  var g = Math.round(148 - 60 * t);
  var b = Math.round(136 - 106 * t);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function initOSMB(lat, lng, zoom) {
  if (osmb) {
    map.removeLayer(osmb);
    osmb = null;
  }
  map.setView([lat, lng], zoom || 16);
  loading.classList.remove('hidden');

  osmb = new OSMBuildings(map);
  osmb.load('https://{s}.data.osmbuildings.org/0.2/59fcc2e8/tile/{z}/{x}/{y}.json');

  osmb.style({
    color: '#ddd',
    roofColor: '#ccc',
    shadows: btnShadows.classList.contains('active')
  });

  osmb.each(function(f) {
    if (f.properties.height) {
      f.properties.wallColor = heightColor(f.properties.height);
      f.properties.roofColor = heightColor(f.properties.height * 0.9);
    }
  });

  osmb.click(function(f) {
    var h = f.properties.height || '?';
    var wall = f.properties.wallColor || '#ddd';
    popup.innerHTML = 'Building ID: ' + (f.id || '—') + '<br>Height: ' + h + 'm';
    popup.classList.add('show');

    osmb.each(function(f2) {
      if (f2.id === f.id) {
        f2.properties.wallColor = '#f59e0b';
        f2.properties.roofColor = '#fbbf24';
      } else {
        f2.properties.wallColor = heightColor(f2.properties.height || 0);
        f2.properties.roofColor = heightColor((f2.properties.height || 0) * 0.9);
      }
    });
    osmb.set(osmb._data); // redraw
  });

  setTimeout(function() { loading.classList.add('hidden'); }, 1200);
}

function switchLocation(key) {
  if (key === activeLocation) return;
  activeLocation = key;
  var loc = locations[key];
  locBtns.forEach(function(b) { b.classList.toggle('active', b.dataset.loc === key); });
  initOSMB(loc.lat, loc.lng, loc.zoom);
}

btnShadows.addEventListener('click', function() {
  this.classList.toggle('active');
  if (osmb) osmb.style({ shadows: this.classList.contains('active') });
});

locBtns.forEach(function(b) {
  b.addEventListener('click', function() { switchLocation(this.dataset.loc); });
});

// Responsive
if (window.ResizeObserver) {
  new ResizeObserver(function() { map.invalidateSize(); }).observe(document.getElementById('map'));
}

// Keyboard: 1-4 switch locations, S toggle shadows
document.addEventListener('keydown', function(e) {
  var keys = ['1','2','3','4'];
  var i = keys.indexOf(e.key);
  if (i >= 0) switchLocation(Object.keys(locations)[i]);
  if (e.key === 's' || e.key === 'S') btnShadows.click();
});

// Init default
var def = locations.shanghai;
map.setView([def.lat, def.lng], def.zoom);
tile.on('load', function() { initOSMB(def.lat, def.lng, def.zoom); });
</script>
</body>
</html>
