<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 城市 · 直升机视角</title>
<link rel="stylesheet" href="./lib/leaflet.css" />
<script src="./lib/leaflet.js"></script>
<script src="./lib/OSMBuildings-Leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#map{height:100%;width:100%;background:#e8e8e0}
.ctrl-panel{position:absolute;top:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:8px;max-width:260px}
.ctrl-btn{padding:8px 14px;border:0;border-radius:8px;background:#fff;color:#333;font-size:14px;font-weight:500;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:all .15s;text-align:left;user-select:none}
.ctrl-btn:hover{background:#f0f0f0;transform:translateY(-1px)}
.ctrl-btn.active{background:#2563eb;color:#fff}
.ctrl-btn.active:hover{background:#1d4ed8}
.location-group{display:flex;flex-wrap:wrap;gap:6px}
.location-group .ctrl-btn{flex:1;min-width:65px;text-align:center;font-size:12px;padding:6px 8px}
.tip{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(0,0,0,.85);backdrop-filter:blur(16px);color:#fff;padding:14px 22px;border-radius:12px;font-size:13px;text-align:center;min-width:200px;opacity:0;transition:opacity .35s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.tip.show{opacity:1}
.tip strong{color:#60a5fa;font-size:16px}
.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;background:rgba(255,255,255,.95);border-radius:16px;padding:24px 36px;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center;font-size:15px;color:#555;transition:opacity .4s;display:flex;flex-direction:column;align-items:center;gap:12px;min-width:220px}
.loading.hidden{opacity:0;pointer-events:none}
.spinner{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.attribution{position:absolute;bottom:4px;right:4px;z-index:999;font-size:10px;color:#aaa;background:rgba(255,255,255,.5);padding:2px 6px;border-radius:4px;pointer-events:none}
.attribution a{color:#999;text-decoration:none}
</style>
</head>
<body>
<div id="map"></div>
<div class="ctrl-panel">
  <button class="ctrl-btn active" id="btnTilt">🎯 透视视角</button>
  <div class="location-group">
    <button class="ctrl-btn active" data-loc="shanghai">上海</button>
    <button class="ctrl-btn" data-loc="hongkong">香港</button>
    <button class="ctrl-btn" data-loc="chongqing">重庆</button>
  </div>
</div>
<div class="tip" id="tip"></div>
<div class="loading" id="loading">
  <div class="spinner"></div>
  <span>Loading 3D Buildings...</span>
</div>
<div class="attribution">© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> · 建筑数据 © OSM</div>
<script>
var locations = {
  shanghai:  { lat: 31.241, lng: 121.500, zoom: 16, file: './data/3d/shanghai/buildings.json', name: '上海金茂中心' },
  hongkong:  { lat: 22.285, lng: 114.160, zoom: 15, file: './data/3d/hongkong/buildings.json', name: '香港维港' },
  chongqing: { lat: 29.562, lng: 106.574, zoom: 16, file: './data/3d/chongqing/buildings.json', name: '重庆解放碑' }
};

var map = L.map('map', {
  zoomControl: false, attributionControl: false
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

var osmb = new OSMBuildings(map);
osmb.style({ color: '#e8e8e8', roofColor: '#f5f5f0', altColor: '#d0d0d0', shadows: false });

// Helicopter perspective tilt
var tiltEnabled = true;
var tiltApplied = false;
function applyTilt(on) {
  document.querySelectorAll('.leaflet-overlay-pane canvas').forEach(function(c) {
    c.style.transform = on ? 'perspective(900px) rotateX(45deg)' : '';
    c.style.transformOrigin = 'center bottom';
  });
}
var origOnAdd = osmb.onAdd;
osmb.onAdd = function(m) {
  origOnAdd.call(this, m);
  if (!tiltApplied) { tiltApplied = true; setTimeout(function() { applyTilt(tiltEnabled); }, 50); }
};

var tip = document.getElementById('tip');
var loading = document.getElementById('loading');
var btnTilt = document.getElementById('btnTilt');
var locBtns = document.querySelectorAll('[data-loc]');
var activeLocation = 'shanghai';
var WALL_COLOR = '#e8e8e8', ROOF_COLOR = '#f5f5f0', ALT_COLOR = '#d0d0d0';

function loadBuildings(file) {
  loading.classList.remove('hidden');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', file, true);
  xhr.onload = function() {
    try {
      var data = JSON.parse(xhr.responseText);
      var features = data.features.map(function(f) {
        var h = f.properties.height || 20;
        var coords = f.geometry.coordinates[0].map(function(c) {
          return [c[1], c[0]]; // Swap [lat, lng] to [lng, lat]
        });
        coords.push(coords[0]);
        return {
          type: 'Feature',
          properties: { height: h, wallColor: WALL_COLOR, roofColor: ROOF_COLOR, altColor: ALT_COLOR },
          geometry: { type: 'Polygon', coordinates: [coords] }
        };
      });
      osmb.set({ type: 'FeatureCollection', features: features });
    } catch(e) { console.error(e); }
    loading.classList.add('hidden');
  };
  xhr.onerror = function() { loading.classList.add('hidden'); };
  xhr.send();
}

function switchLocation(key) {
  if (key === activeLocation) return;
  activeLocation = key;
  var loc = locations[key];
  locBtns.forEach(function(b) { b.classList.toggle('active', b.dataset.loc === key); });
  map.setView([loc.lat, loc.lng], loc.zoom);
  setTimeout(function() { loadBuildings(loc.file); }, 300);
}

btnTilt.addEventListener('click', function() {
  tiltEnabled = !tiltEnabled;
  this.classList.toggle('active');
  this.textContent = tiltEnabled ? '🎯 透视视角' : '🗺️ 俯视平面';
  applyTilt(tiltEnabled);
});

locBtns.forEach(function(b) {
  b.addEventListener('click', function() { switchLocation(this.dataset.loc); });
});

osmb.click(function(e) {
  var props = (e.feature && e.feature.properties) ? e.feature.properties : (e.properties || {});
  var h = props.height || 0;
  tip.innerHTML = '高度 <strong>' + h + '</strong> m · ' + Math.round(h / 3.8) + ' 层';
  tip.classList.add('show');
});
map.on('click', function() { tip.classList.remove('show'); });

document.addEventListener('keydown', function(e) {
  var keys = ['1','2','3'];
  var i = keys.indexOf(e.key);
  if (i >= 0) switchLocation(Object.keys(locations)[i]);
  if (e.key === 's' || e.key === 'S') btnTilt.click();
});

if (window.ResizeObserver) {
  new ResizeObserver(function() { map.invalidateSize(); }).observe(document.getElementById('map'));
}

// Init
var def = locations.shanghai;
map.setView([def.lat, def.lng], def.zoom);
setTimeout(function() { loadBuildings(def.file); }, 300);
</script>
</body>
</html>
