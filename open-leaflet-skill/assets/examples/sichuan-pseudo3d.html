<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四川省 2.5D 隆起 + 市界分割</title>
<link rel="stylesheet" href="../lib/leaflet.css" />
<script src="../lib/leaflet.js"></script>
<script src="../data/geo-data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#map{height:100%;width:100%;background:#e8e8e0}

/* Title Bar */
.title-bar{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(0,0,0,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#fff;padding:8px 20px;border-radius:12px;font-size:14px;font-weight:600;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:6px}
.title-bar .badge{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.3px}
.title-bar .sub{color:#94a3b8;font-weight:400;font-size:12px}

/* Loading */
.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;background:rgba(255,255,255,.95);border-radius:16px;padding:24px 36px;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center;font-size:14px;color:#555;transition:opacity .5s}
.loading.hidden{opacity:0;pointer-events:none}

/* Info Panel */
.info-panel{position:absolute;top:68px;right:14px;z-index:1000;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:12px;padding:14px 18px;min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.06)}
.info-panel h3{margin:0 0 1px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px;color:#1f2937}
.info-panel .sub{font-size:10px;color:#6b7280;margin-bottom:8px}
.info-panel .row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(0,0,0,.05);color:#374151}
.info-panel .row:last-child{border-bottom:0}
.info-panel .label{color:#6b7280}
.info-panel .value{font-weight:600}
.info-panel .value.orange{color:#d97706}
.info-panel .value.blue{color:#2563eb}
.info-panel .value.green{color:#059669}

/* Height Slider */
.height-control{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:8px;padding:6px 14px;border:1px solid rgba(0,0,0,.06)}
.height-control label{color:#6b7280;font-size:10px;white-space:nowrap}
.height-control input[type=range]{width:100px;height:3px;-webkit-appearance:none;appearance:none;background:#d1d5db;border-radius:2px;outline:none;cursor:pointer}
.height-control input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);cursor:pointer;border:2px solid #fff;box-shadow:0 0 8px rgba(99,102,241,.3)}
.height-control .height-val{color:#6366f1;font-size:11px;font-weight:600;min-width:32px}

/* Attribution */
.attribution{position:absolute;bottom:3px;right:4px;z-index:999;font-size:9px;color:#999;padding:1px 5px;border-radius:3px}
.attribution a{color:#666;text-decoration:none}

/* Popup */
.leaflet-popup.card-popup .leaflet-popup-content-wrapper{padding:0;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.leaflet-popup.card-popup .leaflet-popup-content{margin:0;width:auto!important}
.leaflet-popup.card-popup .leaflet-popup-tip{box-shadow:none}
.popup-card{padding:12px 14px 14px}
.popup-card h3{margin:0 0 1px;font-size:15px;font-weight:600;color:#1f2937}
.popup-card .sub{font-size:10px;color:#6b7280;margin-bottom:6px}
.popup-card .row{display:flex;justify-content:space-between;padding:2px 0;font-size:11px;border-bottom:1px solid rgba(0,0,0,.05);color:#374151}
.popup-card .row:last-child{border-bottom:0}
.popup-card .lbl{color:#6b7280}
.popup-card .val{font-weight:600}

/* City Labels */
.city-label{font-size:10px;font-weight:600;color:#374151;text-shadow:0 1px 4px rgba(255,255,255,.85),0 0 8px rgba(255,255,255,.6);white-space:nowrap;pointer-events:none;line-height:1}
</style>
</head>
<body>

<div id="map">
  <div class="loading" id="loading">加载地理数据...</div>
</div>

<div class="title-bar">
  <span>🗺️ 四川省 2.5D</span><span class="badge">全省隆起</span>
  <span class="sub">点击城市查看名称</span>
</div>

<div class="info-panel">
  <h3>🗺️ 四川省</h3>
  <div class="sub">中国西南 · 省会 成都</div>
  <div class="row"><span class="label">面积</span><span class="value orange">48.6万 km²</span></div>
  <div class="row"><span class="label">人口</span><span class="value blue">8,372万</span></div>
  <div class="row"><span class="label">地级市</span><span class="value green">21 个</span></div>
  <div class="row"><span class="label">挤出高度</span><span class="value green" id="heightDisplay">30px</span></div>
</div>

<div class="height-control">
  <label>挤出高度</label>
  <input type="range" id="heightSlider" min="10" max="80" value="30">
  <span class="height-val" id="heightVal">30px</span>
</div>

<div class="attribution">© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> · 边界数据 © DataV/高德</div>

<script>
// ============================================================
// 1. MAP — Flat view, no CSS tilt
// ============================================================
var map = L.map('map', {
  center: [30.5, 103.0], zoom: 6,
  zoomControl: false, attributionControl: false
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

// ============================================================
// 2. HELPERS
// ============================================================
var PROVINCE_COLOR = '#6366f1';

function darken(hex, factor) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b].map(function(c){return Math.min(255,Math.round(c*factor)).toString(16).padStart(2,'0');}).join('');
}

function offsetRing(ring, dx, dy) {
  return ring.map(function(ll) {
    var pt = map.latLngToLayerPoint(L.latLng(ll[0], ll[1]));
    pt.x += dx; pt.y += dy;
    var n = map.layerPointToLatLng(pt);
    return [n.lat, n.lng];
  });
}

function ringCentroid(ring) {
  var sLat = 0, sLng = 0, n = 0;
  ring.forEach(function(c) { sLat += c[1]; sLng += c[0]; n++; });
  return { lat: sLat / n, lng: sLng / n };
}

function coordsToLatLngs(coords) {
  var out = coords.map(function(c) { return [c[1], c[0]]; });
  if (out[0][0] !== out[out.length-1][0] || out[0][1] !== out[out.length-1][1]) out.push(out[0]);
  return out;
}

// ============================================================
// 3. PROVINCE EXTRUSION (unified block)
// ============================================================
var extrusionGroup = null;
var currentHeight = 30;

function buildProvinceExtrusion(ring, heightPx) {
  var latlngs = coordsToLatLngs(ring);

  // Top face offset
  var topPts = offsetRing(latlngs, -heightPx*0.35, heightPx*0.65);
  var topCoords = topPts.map(function(ll) { return [ll[1], ll[0]]; });
  if (topCoords[0][0] !== topCoords[topCoords.length-1][0] || topCoords[0][1] !== topCoords[topCoords.length-1][1])
    topCoords.push(topCoords[0]);

  // Base shadow
  var basePts = offsetRing(latlngs, 0, heightPx*0.65+2);
  var baseCoords = basePts.map(function(ll) { return [ll[1], ll[0]]; });
  if (baseCoords[0][0] !== baseCoords[baseCoords.length-1][0] || baseCoords[0][1] !== baseCoords[baseCoords.length-1][1])
    baseCoords.push(baseCoords[0]);

  L.polygon([baseCoords], {
    color: 'transparent', weight: 0,
    fillColor: '#333', fillOpacity: 0.12, interactive: false
  }).addTo(extrusionGroup);

  L.polygon([topCoords], {
    color: '#fff', weight: 1.5, opacity: 0.5,
    fillColor: PROVINCE_COLOR, fillOpacity: 0.7,
    interactive: true
  }).bindPopup(
    '<div class="popup-card"><h3>🗺️ 四川省</h3><div class="sub">中国西南 · 48.6万 km²</div>' +
    '<div class="row"><span class="lbl">人口</span><span class="val">8,372万</span></div>' +
    '<div class="row"><span class="lbl">省会</span><span class="val">成都</span></div></div>',
    { className: 'card-popup', maxWidth: 180 }
  ).addTo(extrusionGroup);

  // Walls
  var wallFeatures = [];
  var wallBase = offsetRing(latlngs, -heightPx*0.35, heightPx*0.65);
  for (var i = 0; i < latlngs.length - 1; i++) {
    var j = i + 1;
    wallFeatures.push({
      type: 'Feature', properties: {},
      geometry: {
        type: 'Polygon',
        coordinates: [[
          [wallBase[i][1], wallBase[i][0]],
          [wallBase[j][1], wallBase[j][0]],
          [latlngs[j][1], latlngs[j][0]],
          [latlngs[i][1], latlngs[i][0]]
        ]]
      }
    });
  }
  if (wallFeatures.length > 0) {
    L.geoJSON({ type: 'FeatureCollection', features: wallFeatures }, {
      style: {
        color: darken(PROVINCE_COLOR, 0.5), weight: 0.4, opacity: 0.5,
        fillColor: darken(PROVINCE_COLOR, 0.65), fillOpacity: 0.35
      }
    }).addTo(extrusionGroup);
  }
}

function buildFullExtrusion(heightPx) {
  if (extrusionGroup) map.removeLayer(extrusionGroup);
  extrusionGroup = L.layerGroup().addTo(map);

  if (typeof GEO_DATA === 'undefined' || !GEO_DATA.china_provinces) return;

  // Find Sichuan
  var sichuan = null;
  for (var i = 0; i < GEO_DATA.china_provinces.features.length; i++) {
    if (GEO_DATA.china_provinces.features[i].properties.name === '四川省') {
      sichuan = GEO_DATA.china_provinces.features[i]; break;
    }
  }
  if (!sichuan) return;

  var rings = [];
  var g = sichuan.geometry;
  if (g.type === 'Polygon') rings = [g.coordinates[0]];
  else if (g.type === 'MultiPolygon') rings = g.coordinates.map(function(p) { return p[0]; });
  rings.forEach(function(ring) { buildProvinceExtrusion(ring, heightPx); });

  // Draw city boundaries + labels on top
  drawCityDetails(heightPx);
}

// ============================================================
// 4. CITY BOUNDARY LINES + LABELS (on extrusion top surface)
// ============================================================
function drawCityDetails(heightPx) {
  if (!window.sichuanCities) return;

  window.sichuanCities.features.forEach(function(f) {
    var name = f.properties.name || '';
    var geom = f.geometry;

    var rings = [];
    if (geom.type === 'Polygon') rings = [geom.coordinates[0]];
    else if (geom.type === 'MultiPolygon') rings = geom.coordinates.map(function(p) { return p[0]; });
    else return;

    rings.forEach(function(ring) {
      // Boundary line (offset to top surface)
      var latlngs = coordsToLatLngs(ring);
      var offset = offsetRing(latlngs, -heightPx*0.35, heightPx*0.65);
      var lineCoords = offset.map(function(ll) { return [ll[1], ll[0]]; });

      L.polyline(lineCoords, {
        color: 'rgba(255,255,255,0.6)', weight: 0.7, opacity: 0.5,
        interactive: false
      }).addTo(extrusionGroup);
    });

    // City name label at centroid (offset to top surface)
    var centroid = ringCentroid(rings[0]);
    var pt = map.latLngToLayerPoint(L.latLng(centroid.lat, centroid.lng));
    pt.x += -heightPx*0.35; pt.y += heightPx*0.65;
    var offsetC = map.layerPointToLatLng(pt);

    L.marker([offsetC.lat, offsetC.lng], {
      icon: L.divIcon({ className: 'city-label', html: name, iconSize: [0, 0], iconAnchor: [0, 0] }),
      interactive: false
    }).addTo(extrusionGroup);
  });
}

function addOtherProvinces() {
  if (typeof GEO_DATA === 'undefined' || !GEO_DATA.china_provinces) return;
  var others = GEO_DATA.china_provinces.features.filter(function(f) { return f.properties.name !== '四川省'; });
  if (others.length > 0) {
    L.geoJSON(others, {
      style: { color: '#999', weight: 0.5, opacity: 0.2, fillColor: '#d0d0d0', fillOpacity: 0.04 }
    }).addTo(map);
  }
}

// ============================================================
// 5. DATA LOADING
// ============================================================
var loading = document.getElementById('loading');

function loadCityData(callback) {
  loading.textContent = '正在加载城市边界数据...';
  fetch('https://geo.datav.aliyun.com/areas_v3/bound/510000_full.json')
    .then(function(r) { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data) { window.sichuanCities = data; callback(); })
    .catch(function() {
      loading.textContent = '尝试备用数据源...';
      return fetch('https://geojson.cn/api/china/510000.json')
        .then(function(r) { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
        .then(function(data) {
          if (data.features) window.sichuanCities = data;
          else throw new Error('unknown format');
          callback();
        })
        .catch(function() { callback(); });
    });
}

function init() {
  loading.textContent = '加载地理数据...';

  var ready = function() {
    loading.classList.add('hidden');

    // Fit to Sichuan bounds
    if (window.sichuanCities) {
      var allLatLngs = [];
      window.sichuanCities.features.forEach(function(f) {
        var g = f.geometry;
        if (g.type === 'Polygon') g.coordinates[0].forEach(function(c) { allLatLngs.push([c[1], c[0]]); });
        else if (g.type === 'MultiPolygon') g.coordinates.forEach(function(p) { p[0].forEach(function(c) { allLatLngs.push([c[1], c[0]]); }); });
      });
      if (allLatLngs.length > 0) map.fitBounds(L.latLngBounds(allLatLngs).pad(0.15));
    }

    map.whenReady(function() { buildFullExtrusion(currentHeight); });

    var t;
    function debounce() {
      if (t) clearTimeout(t);
      t = setTimeout(function() { buildFullExtrusion(currentHeight); }, 80);
    }
    map.on('moveend', debounce);
    map.on('zoomend', debounce);

    addOtherProvinces();
  };

  // Wait for province data then load city data
  var check = setInterval(function() {
    if (typeof GEO_DATA !== 'undefined' && GEO_DATA.china_provinces) {
      clearInterval(check);
      loadCityData(ready);
    }
  }, 100);
  setTimeout(function() {
    if (!loading.classList.contains('hidden')) loading.textContent = '数据加载失败';
  }, 10000);
}

// ============================================================
// 6. HEIGHT SLIDER
// ============================================================
document.getElementById('heightSlider').addEventListener('input', function() {
  var v = parseInt(this.value);
  document.getElementById('heightVal').textContent = v + 'px';
  document.getElementById('heightDisplay').textContent = v + 'px';
  currentHeight = v;
  buildFullExtrusion(v);
});

// ============================================================
// 7. RESIZE
// ============================================================
var rt;
function resize() { if (rt) clearTimeout(rt); rt = setTimeout(function() { map.invalidateSize(); buildFullExtrusion(currentHeight); }, 150); }
if (window.ResizeObserver) new ResizeObserver(resize).observe(document.getElementById('map'));
window.addEventListener('resize', resize);

// ============================================================
// 8. START
// ============================================================
init();
</script>
</body>
</html>
